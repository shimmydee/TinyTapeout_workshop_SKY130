
# Tiny Tapeout project information
project:
  title:        "Seven-Segment Display with Cursor Editing"
  author:       "Daniel S"
  discord:      "mistershi"
  description:  "Cursor navigation across a 4-digit common-anode seven-segment display, with toggle-on/off editing and a blinking cursor. Ported from a Basys 3 FPGA project (Task 1)."
  language:     "Verilog"
  clock_hz:     25000000

  # How many tiles your design occupies? A single tile is about 167x108 uM.
  tiles: "1x1"          # Valid values: 1x1, 1x2, 2x2, 3x2, 4x2, 6x2 or 8x2

  # Your top module name must start with "tt_um_". Make it unique by including your github username:
  top_module:  "tt_um_shimmydee_sevenseg"

  # List your project's source files here. Source files must be in ./src and you must list each source file separately, one per line:
  source_files:
    - "project.v"
    - "Task_1_TOP.v"
    - "SevenSegement_PWM.v"
    - "button_conditioning.v"
    - "debouncer.v"
    - "heartbeat.v"
    - "cursor.v"
    - "spot.v"
    - "toggle.v"
    - "blink.v"

# The pinout of your project. Leave unused pins blank. DO NOT delete or add any pins.
pinout:
  # Inputs
  ui[0]: "btnC (centre)"
  ui[1]: "btnU (up)"
  ui[2]: "btnD (down)"
  ui[3]: "btnL (left)"
  ui[4]: "btnR (right)"
  ui[5]: "sw0 - level select (0=L1 cursor, 1=L2 toggle)"
  ui[6]: "sw3 - autoloop enable"
  ui[7]: ""

  # Outputs
  uo[0]: "seg[0] (active-low)"
  uo[1]: "seg[1] (active-low)"
  uo[2]: "seg[2] (active-low)"
  uo[3]: "seg[3] (active-low)"
  uo[4]: "seg[4] (active-low)"
  uo[5]: "seg[5] (active-low)"
  uo[6]: "seg[6] (active-low)"
  uo[7]: "dp (active-low)"

  # Bidirectional pins
  uio[0]: ""
  uio[1]: ""
  uio[2]: ""
  uio[3]: ""
  uio[4]: "an[0] digit 0 anode (output, active-low)"
  uio[5]: "an[1] digit 1 anode (output, active-low)"
  uio[6]: "an[2] digit 2 anode (output, active-low)"
  uio[7]: "an[3] digit 3 anode (output, active-low)"

# Do not change!
yaml_version: 6
